services:
  app:
    build: .
    stdin_open: true
    tty: true
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - red

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - red

volumes:
  mongo_data:

networks:
  red:
